spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

jwt.issuer=${JWT_ISSUER}
jwt.signing_key_ac=${JWT_SIGNING_KEY_AC}
jwt.signing_key_rf=${JWT_SIGNING_KEY_RF}
jwt.expiration_ms_ac=${JWT_EXPIRATION_MS_AC}
jwt.expiration_ms_rf=${JWT_EXPIRATION_MS_RF}

cloudinary.cloud_name: ${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key: ${CLOUDINARY_API_KEY}
cloudinary.api_secret: ${CLOUDINARY_API_SECRET}

gemini.api_key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

booking.mail.from=${MAIL_FROM:${MAIL_USERNAME}}